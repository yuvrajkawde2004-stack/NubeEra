services:
  lxp-mysql:
    image: mysql:8.0
    container_name: lxp-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - lxp_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -p$$MYSQL_ROOT_PASSWORD --silent || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s
    networks:
      - lxp-network

  lxp-api:
    build:
      context: ./Backend
      dockerfile: Veriton.API/Dockerfile
    container_name: lxp-api
    depends_on:
      lxp-mysql:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://0.0.0.0:5000
      ConnectionStrings__MySql: Server=lxp-mysql;Port=3306;Database=${MYSQL_DATABASE};User=${MYSQL_USER};Password=${MYSQL_PASSWORD};SslMode=None;AllowPublicKeyRetrieval=True
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      Google__ClientId: ${GOOGLE_CLIENT_ID}
      Google__ClientSecret: ${GOOGLE_CLIENT_SECRET}
      GitHub__ClientId: ${GITHUB_CLIENT_ID}
      GitHub__ClientSecret: ${GITHUB_CLIENT_SECRET}
      LinkedIn__ClientId: ${LINKED_CLIENT_ID}
      LinkedIn__ClientSecret: ${LINKED_CLIENT_SECRET}
      Frontend__Url: ${FRONTEND_URL}
    ports:
      - "5001:5000"
    restart: unless-stopped
    networks:
      - lxp-network

  lxp-frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: lxp-frontend
    depends_on:
      - lxp-api
    ports:
      - "5174:80"
    restart: unless-stopped
    networks:
      - lxp-network

volumes:
  lxp_mysql_data:

networks:
  lxp-network:
    driver: bridge
